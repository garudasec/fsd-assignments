<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Schedule</title>
    <style>
        table{
            width: 80%;
            margin: 50px auto;
            border: 1px solid black;
            border-collapse: collapse;
        }

        th, td{
            padding: 8px ;
            text-align: center;
        }
    </style>
</head>
<body>
    <table border="1px">
        <caption><h2>Weekly Schedule</h2></caption>

        <thead>
            <tr>
                <th>Time</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="2">Morning</td>
                <td>Math</td>
                <td rowspan="2" colspan="2">Science Lab</td>
                <td>History</td>
                <td>English</td>
            </tr>

            <tr>
                <!-- <td>Morning</td> -->
                <td>Physics</td>
                <!-- <td>Science Lab</td> -->
                <!-- <td></td> -->
                <td>Geography</td>
                <td>Sports</td>
            </tr>

            <tr>
                <td>Afternoon</td>
                <td colspan="5">Lunch break</td>
                <!-- <td></td>
                <td></td>
                <td></td>
                <td></td> -->
            </tr>

            <tr>
                <td>Evening</td>
                <td>Computer Science</td>
                <td>Art</td>
                <td rowspan="2">Music</td>
                <td>Drama</td>
                <td>Free Period</td>
            </tr>

            <tr>
                <td>Late Evening</td>
                <td colspan="2">Self Study</td>
                <!-- <td></td> -->
                <!-- <td>Music</td> -->
                <td>Debate</td>
                <td>Sports</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
