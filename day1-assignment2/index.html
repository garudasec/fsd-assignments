<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <style></style>
  </head>
  <body>
    <form action="">
      <h1>College Event Registration 📝</h1>

      <label for="name">Your Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required /><br /><br>

      <label for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required /><br /><br>

      <label for="age">Age:</label>
      <input type="number" id="age" placeholder="Enter your age" required /><br /><br>

      <label>Select Event Category:</label><br>
      <input type="checkbox" id="hackathon">Coding Hackathon 🖥️ <br>
      <input type="checkbox" id="debate"> Debate Competition 🎤 <br>
      <input type="checkbox" id="sports"> Sports Tournament🏀 <br><br>



      <label for="event-date">Event Date:</label>
      <input type="date" id="event-date" /><br /><br>

      <label for="time-slot">Preferred Time Slot:</label>
      <input type="time" id="time-slot"/> <br><br>

      <button type="submit">Register Now</button>
    </form>
  </body>
</html>
