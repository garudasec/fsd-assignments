<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="keyboard">

        <div class="row" id="r1">
            <div>-</div>
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
            <div>8</div>
            <div>9</div>
            <div>0</div>
            <div class="delete">Delete</div>
        </div>

        <div class="row" id="r2">
            <div class="tab">Tab</div>
            <div>Q</div>
            <div>W</div>
            <div>E</div>
            <div>R</div>
            <div>T</div>
            <div>Y</div>
            <div>U</div>
            <div>I</div>
            <div>O</div>
            <div>P</div>
            <div>\</div>
        </div>

        <div class="row" id="r3">
            <div class="caps">Caps</div>
            <div>A</div>
            <div>S</div>
            <div>D</div>
            <div>F</div>
            <div>G</div>
            <div>H</div>
            <div>J</div>
            <div>K</div>
            <div>L</div>
            <div>;</div>
            <div>'</div>
            <div class="enter">Enter</div>
        </div>

        <div class="row" id="r4">
            <div class="shift">Shift</div>
            <div>Z</div>
            <div>X</div>
            <div>C</div>
            <div>V</div>
            <div>B</div>
            <div>N</div>
            <div>M</div>
            <div>,</div>
            <div>.</div>
            <div class="shift">Shift</div>
        </div>

        <div class="row" id="r5">
            <div class="windows">Windows</div>
            <div>Ctrl</div>
            <div>Options</div>
            <div>Alt</div>
            <div id="space">SPACE</div>
            <div>Alt</div>
            <div>Option</div>
            <div>&lt;</div>
            <div>&gt;</div>
        </div>

    </div>

</body>
</html>
