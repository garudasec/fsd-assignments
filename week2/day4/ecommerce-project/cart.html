<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Naptol</title>

  <script>
    (function () {
      if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark");
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div id="navbar-root"></div>

  <h1 class="page-title">Your Cart</h1>
  <p class="page-subtitle">Review your items, adjust quantities, and check out.</p>

  <div class="container">
    <div id="cartList"></div>
    <div class="cart-summary" id="cartSummary"></div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/cart.js"></script>

</body>
</html>
